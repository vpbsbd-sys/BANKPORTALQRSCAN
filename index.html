<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bank Receipt Printer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
:root{--navy:#0a2540;--gold:#c9a84c;--gold-light:#f0d58c;--blue:#1a4b8c;--green:#1a7a4a;--red:#c0392b;--cream:#fdfaf4;--border:#d0dbe8;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:#000;}

.header{background:linear-gradient(135deg,var(--navy),#163262);padding:12px 18px;display:flex;align-items:center;gap:12px;}
.logo{width:42px;height:42px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.header h1{font-family:'Playfair Display',serif;color:#fff;font-size:16px;flex:1;}
.header p{color:var(--gold-light);font-size:10px;margin-top:1px;}
.live{background:#1a7a4a;border-radius:20px;padding:4px 12px;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;}
.dot{width:7px;height:7px;background:#4eff91;border-radius:50%;animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

/* SCAN VIEW */
#scan-view{position:relative;width:100%;background:#000;}
#video{width:100%;display:block;max-height:70vh;object-fit:cover;}

/* SCAN OVERLAY */
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.qr-frame{width:62%;max-width:280px;aspect-ratio:1;position:relative;}
.qr-frame::before{content:'';position:absolute;inset:0;border:2px solid rgba(255,255,255,0.15);border-radius:8px;}
.corner{position:absolute;width:28px;height:28px;border-color:var(--gold);border-style:solid;}
.corner.tl{top:0;left:0;border-width:4px 0 0 4px;border-radius:4px 0 0 0;}
.corner.tr{top:0;right:0;border-width:4px 4px 0 0;border-radius:0 4px 0 0;}
.corner.bl{bottom:0;left:0;border-width:0 0 4px 4px;border-radius:0 0 0 4px;}
.corner.br{bottom:0;right:0;border-width:0 4px 4px 0;border-radius:0 0 4px 0;}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:scanMove 2s linear infinite;box-shadow:0 0 8px var(--gold);}
@keyframes scanMove{0%{top:4px}100%{top:calc(100% - 4px)}}

/* STATUS BAR */
.status-bar{padding:12px 16px;text-align:center;font-size:14px;font-weight:600;}
.s-wait{background:#1a1a2e;color:var(--gold-light);}
.s-ok{background:#0d3320;color:#4eff91;}
.s-err{background:#3a0a0a;color:#ff6b6b;}
.s-print{background:#2a1f00;color:var(--gold-light);}

/* RECEIPT OVERLAY */
#receipt-overlay{display:none;position:fixed;inset:0;background:var(--cream);z-index:100;overflow-y:auto;}
.receipt-header{background:var(--navy);padding:14px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;}
.receipt-header h2{font-family:'Playfair Display',serif;color:#fff;font-size:16px;flex:1;}
.btn{padding:10px 20px;border-radius:20px;border:none;font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;cursor:pointer;}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-outline{background:transparent;border:2px solid rgba(255,255,255,0.4);color:#fff;margin-left:8px;}
.receipt-body{padding:16px;}

/* PREVIEW CARD */
.preview-card{background:#fff;border-radius:12px;padding:16px;border:1px solid var(--border);margin-bottom:14px;}
.preview-card h3{font-size:13px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;}
.info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f4f8;font-size:13px;}
.info-row:last-child{border-bottom:none;}
.info-row .lbl{color:#8a99b3;}.info-row .val{color:var(--navy);font-weight:600;}

/* SLIP STYLES */
.slip-page{width:100%;font-family:'DM Sans',Arial,sans-serif;}
.slip-top{text-align:center;font-size:11px;color:#666;border-bottom:2px dashed #ccc;padding-bottom:10px;margin-bottom:14px;}
.slip-top strong{display:block;font-size:14px;color:#0a2540;margin-bottom:3px;}
.slip-wrap{display:flex;gap:14px;margin-bottom:14px;}
.slip{flex:1;border:2px solid #000;padding:12px;font-size:11px;position:relative;}
.slip-bank-copy{background:#d4e8ff;}.slip-cust-copy{background:#fff9e6;}
.slip-copy-tag{position:absolute;top:6px;right:8px;font-size:10px;font-weight:700;text-transform:uppercase;border:1px solid #000;padding:2px 6px;}
.slip-header{text-align:center;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:10px;}
.slip-bank-name{font-size:13px;font-weight:800;text-transform:uppercase;}
.slip-type{font-size:11px;font-weight:700;letter-spacing:1px;margin-top:4px;}
.slip-grid{display:grid;grid-template-columns:1fr 1fr;border:1px solid #000;margin-bottom:8px;}
.slip-cell{padding:5px 7px;border-right:1px solid #ccc;font-size:11px;}
.slip-cell:last-child{border-right:none;}
.slip-cell strong{display:block;font-size:9px;text-transform:uppercase;color:#555;}
.slip-table{width:100%;border-collapse:collapse;margin-bottom:8px;}
.slip-table th{background:rgba(0,0,0,0.08);font-size:10px;text-transform:uppercase;padding:5px 7px;border:1px solid #999;text-align:left;}
.slip-table td{padding:5px 7px;border:1px solid #bbb;}
.slip-words{border:1px solid #000;padding:6px 8px;font-size:11px;margin-bottom:8px;background:rgba(255,255,255,0.5);}
.slip-words strong{font-size:10px;text-transform:uppercase;display:block;margin-bottom:2px;color:#444;}
.slip-ref{font-size:9px;color:#777;margin-top:6px;}
.slip-signs{display:flex;justify-content:space-between;margin-top:18px;font-size:10px;}
.slip-sign{text-align:center;}
.slip-sign-line{width:90px;border-top:1px solid #000;margin:0 auto 3px;}
.slip-footer{text-align:center;font-size:10px;color:#999;border-top:2px dashed #ccc;padding-top:8px;}

@media print{
  #receipt-overlay{display:block!important;position:absolute;overflow:visible;}
  .receipt-header{display:none!important;}
  .preview-card{display:none!important;}
  #print-btn-row{display:none!important;}
  body{background:#fff;}
  .slip-wrap{flex-direction:row!important;page-break-inside:avoid;}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">🏦</div>
  <div style="flex:1">
    <h1>Kolhapur Co-operative Bank</h1>
    <p>Self-Service Receipt Kiosk</p>
  </div>
  <div class="live"><div class="dot"></div>READY</div>
</div>

<!-- CAMERA VIEW -->
<div id="scan-view">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <div class="overlay">
    <div class="qr-frame">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="scan-line"></div>
    </div>
  </div>
</div>
<div class="status-bar s-wait" id="status-bar">📷 Show your QR code inside the frame</div>

<!-- RECEIPT OVERLAY (shown after scan) -->
<div id="receipt-overlay">
  <div class="receipt-header">
    <h2>✅ Receipt Ready</h2>
    <button class="btn btn-gold" id="print-btn-row" onclick="doPrint()">🖨️ Print</button>
    <button class="btn btn-outline" onclick="scanNext()">📷 Scan Next</button>
  </div>
  <div class="receipt-body">
    <div class="preview-card">
      <h3>Slip Summary</h3>
      <div id="preview-rows"></div>
    </div>
    <div id="slip-output"></div>
  </div>
</div>

<div id="print-zone" style="display:none;"></div>

<script>
// ====== COMPACT KEY MAP (matches bank_portal.html short keys) ======
const keyMap = {
  r:'ref', b:'bank', a:'acc', n:'name', m:'mobile', t:'acctype',
  tp:'type', am:'amt', dt:'date', ti:'time',
  bn:'benName', ba:'benAcc', bi:'benIFSC', bb:'benBank', rm:'remarks',
  fv:'favor', py:'payable', pu:'purpose', tn:'tenure', in:'interest',
  au:'auto', nm:'nominee', rl:'relation', jt:'joint', mo:'month',
  lt:'loanType', md:'mode', sv:'service', ns:'nos', lv:'leaves',
  kt:'kycType', dn:'docno', nv:'newval', tb:'tab', cn:'chqNo', cb:'chqBank'
};

function expandKeys(compact) {
  const d = {};
  Object.entries(compact).forEach(([k,v]) => { d[keyMap[k]||k] = v; });
  return d;
}

// ====== AMOUNT TO WORDS ======
function numWords(num){
  num=parseInt(num)||0; if(!num) return '';
  const a=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const b=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  const g=n=>{let s='';if(n>=100){s+=a[Math.floor(n/100)]+' Hundred ';n%=100;}if(n>=20){s+=b[Math.floor(n/10)]+' '+a[n%10]+' ';}else s+=a[n]+' ';return s.trim();};
  let w='',n=num;
  if(n>=10000000){w+=g(Math.floor(n/10000000))+' Crore ';n%=10000000;}
  if(n>=100000){w+=g(Math.floor(n/100000))+' Lakh ';n%=100000;}
  if(n>=1000){w+=g(Math.floor(n/1000))+' Thousand ';n%=1000;}
  if(n>0)w+=g(n);
  return w.trim()+' Rupees Only';
}

// ====== BUILD SLIP ======
function buildSlip(d){
  const type=d.type||'Transaction';
  const amt=parseFloat(d.amt)||0;
  const amtFmt=amt?'&#8377; '+amt.toLocaleString('en-IN'):'';
  const words=amt?numWords(amt):'';
  const meta=new Set(['ref','bank','acc','name','mobile','acctype','type','amt','date','time','addr']);
  const lbl={mode:'Mode',purpose:'Purpose',tab:'Deposit Mode',chqNo:'Cheque No.',chqBank:'Cheque Bank',
    benName:'Beneficiary',benAcc:'Bene. A/C No.',benIFSC:'IFSC Code',benBank:'Bene. Bank',remarks:'Remarks',
    favor:'In Favour of',payable:'Payable at',tenure:'Tenure (Months)',interest:'Interest Payout',
    auto:'Auto Renewal',nominee:'Nominee',relation:'Relation',joint:'Joint Holder',month:'Month',
    loanType:'Loan Type',service:'Service',nos:'Cheque Nos.',leaves:'Leaves',
    kycType:'KYC Type',docno:'Doc No.',newval:'New Value'};
  let rows='';
  Object.entries(d).forEach(([k,v])=>{
    if(meta.has(k)||!v||v==='') return;
    let val=String(v);
    if(k==='auto') val=v==='yes'?'Yes':'No';
    if(k==='mode') val=v==='self'?'Self':'Bearer';
    rows+=`<tr><th>${lbl[k]||k}</th><td>${val}</td></tr>`;
  });
  if(amtFmt) rows+=`<tr><th><strong>Amount</strong></th><td><strong>${amtFmt}</strong></td></tr>`;
  const clr={DD:['#ffe0c8','#fff3e8'],FD:['#e8d8f8','#f5f0ff'],RD:['#d8f0f8','#f0faff'],Loan:['#d4ffe8','#f0fff8']};
  const [bBg,cBg]=clr[type]||['#d4e8ff','#fffde8'];
  const copy=(label,bg)=>`
    <div class="slip" style="background:${bg}">
      <div class="slip-copy-tag">${label} COPY</div>
      <div class="slip-header">
        <div class="slip-bank-name">${d.bank||''}</div>
        <div class="slip-type">${type.toUpperCase()} REQUISITION SLIP</div>
      </div>
      <div class="slip-grid">
        <div class="slip-cell"><strong>Account No.</strong>${d.acc||''}${d.acctype?' ('+d.acctype+')':''}</div>
        <div class="slip-cell"><strong>Date</strong>${d.date||''}</div>
        <div class="slip-cell"><strong>Account Holder</strong>${d.name||''}</div>
        <div class="slip-cell"><strong>Mobile</strong>${d.mobile||''}</div>
      </div>
      <table class="slip-table">
        <thead><tr><th colspan="2">${type} Details</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${words?`<div class="slip-words"><strong>Amount in Words</strong>${words}</div>`:''}
      <div class="slip-ref">Ref: ${d.ref||''} | ${d.date||''} ${d.time||''}</div>
      <div class="slip-signs">
        <div class="slip-sign"><div class="slip-sign-line"></div>Bank Cashier</div>
        <div class="slip-sign"><div class="slip-sign-line"></div>Customer</div>
      </div>
    </div>`;
  return `<div class="slip-page">
    <div class="slip-top"><strong>KOLHAPUR CO-OPERATIVE BANKING PORTAL</strong>Transaction Requisition Slip | ${d.date||''} ${d.time||''}</div>
    <div class="slip-wrap">${copy('BANK',bBg)}${copy('CUSTOMER',cBg)}</div>
    <div class="slip-footer">— Cut here — | Bank Copy: Submit at Counter | Customer Copy: Retain as Receipt —</div>
  </div>`;
}

// ====== CAMERA SCANNER ======
let vid,can,ctx,scanning=false,raf,lastScan='',lastScanTime=0;

async function startScanner(){
  vid=document.getElementById('video');
  can=document.getElementById('canvas');
  ctx=can.getContext('2d',{willReadFrequently:true});
  setStatus('wait','📷 Show your QR code inside the frame');
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:'environment',
        width:{ideal:1920,min:640},
        height:{ideal:1080,min:480},
        focusMode:'continuous'
      }
    });
    vid.srcObject=stream;
    await vid.play();
    scanning=true;
    raf=requestAnimationFrame(tick);
  }catch(e){
    setStatus('err','❌ Camera error: '+e.message);
  }
}

function tick(){
  if(!scanning) return;
  if(vid.readyState===vid.HAVE_ENOUGH_DATA){
    can.width=vid.videoWidth;
    can.height=vid.videoHeight;

    // Draw with slight contrast boost for better scanning from screens
    ctx.filter='contrast(1.4) brightness(1.1)';
    ctx.drawImage(vid,0,0,can.width,can.height);
    ctx.filter='none';

    const img=ctx.getImageData(0,0,can.width,can.height);

    // Try normal then inverted (handles screen glare)
    let code=jsQR(img.data,img.width,img.height,{inversionAttempts:'attemptBoth'});

    if(code&&code.data){
      const now=Date.now();
      // Debounce — don't re-scan same QR within 4 seconds
      if(code.data!==lastScan || now-lastScanTime>4000){
        lastScan=code.data;
        lastScanTime=now;
        onQR(code.data);
        return;
      }
    }
  }
  raf=requestAnimationFrame(tick);
}

function stopScanner(){
  scanning=false;
  cancelAnimationFrame(raf);
}

function onQR(raw){
  stopScanner();
  setStatus('print','⏳ Reading slip data...');

  let d;
  try{
    let parsed;
    // Try base64 direct
    try{
      parsed=JSON.parse(decodeURIComponent(escape(atob(raw))));
    }catch(e){
      // Try URL format with #receipt=
      if(raw.includes('#receipt='))
        parsed=JSON.parse(decodeURIComponent(escape(atob(raw.split('#receipt=')[1]))));
      else throw new Error('Cannot decode');
    }
    // Expand compact keys
    d=expandKeys(parsed);
    if(!d.type||!d.acc) throw new Error('Missing fields');
  }catch(e){
    setStatus('err','❌ Could not read QR. Ask customer to show QR clearly and try again.');
    setTimeout(()=>{
      setStatus('wait','📷 Show your QR code inside the frame');
      scanning=true;
      raf=requestAnimationFrame(tick);
    },3000);
    return;
  }

  // Show preview
  const previewFields=[
    ['Name',d.name||'—'],
    ['Account',(d.acc||'—')+(d.acctype?' ('+d.acctype+')':'')],
    ['Transaction',d.type||'—'],
    ['Amount',d.amt?'₹ '+parseFloat(d.amt).toLocaleString('en-IN'):'—'],
    ['Ref No.',d.ref||'—'],
    ['Date & Time',(d.date||'')+(d.time?' '+d.time:'')]
  ];
  document.getElementById('preview-rows').innerHTML=previewFields
    .map(r=>`<div class="info-row"><span class="lbl">${r[0]}</span><span class="val">${r[1]}</span></div>`)
    .join('');

  // Render slip
  document.getElementById('slip-output').innerHTML=buildSlip(d);

  // Show receipt overlay
  document.getElementById('receipt-overlay').style.display='block';
  setStatus('ok','✅ QR scanned! Printing...');

  // Auto print
  setTimeout(()=>window.print(), 700);
}

function doPrint(){ window.print(); }

function scanNext(){
  document.getElementById('receipt-overlay').style.display='none';
  document.getElementById('slip-output').innerHTML='';
  lastScan='';
  setStatus('wait','📷 Show your QR code inside the frame');
  scanning=true;
  raf=requestAnimationFrame(tick);
}

function setStatus(type,msg){
  const el=document.getElementById('status-bar');
  el.className='status-bar s-'+type;
  el.textContent=msg;
}

window.addEventListener('load',startScanner);
</script>
</body>
</html>
